<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" width="980" height="300">
  <defs>
    <linearGradient id="nsBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f95e6"/>
      <stop offset="0.5" stop-color="#2274cf"/>
      <stop offset="1" stop-color="#14539f"/>
    </linearGradient>
    <linearGradient id="nsGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nsGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e4f59a"/>
      <stop offset="0.35" stop-color="#a8dd3f"/>
      <stop offset="1" stop-color="#5aa018"/>
    </linearGradient>
    <linearGradient id="nsSpark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d8f08a"/>
      <stop offset="1" stop-color="#6bb31d"/>
    </linearGradient>
    <filter id="nsShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0a2c55" flood-opacity="0.45"/>
    </filter>
    <filter id="nsTxtShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="2" flood-color="#0a1f3f" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- banner shape: rounded-left ribbon → arrow point on the right, with a small bottom tab -->
  <g filter="url(#nsShadow)">
    <!-- white sticker outline (drawn as a fat white stroke under the fill) -->
    <path d="M92 70 H760 L905 150 L760 230 H452 q-14 0 -20 12 l-10 20 q-8 16 -26 16 q-18 0 -26 -16 l-10 -20 q-6 -12 -20 -12 H92 Q40 230 40 150 Q40 70 92 70 Z"
          fill="#ffffff" stroke="#ffffff" stroke-width="26" stroke-linejoin="round"/>
    <!-- thin dark-blue rim -->
    <path d="M92 70 H760 L905 150 L760 230 H452 q-14 0 -20 12 l-10 20 q-8 16 -26 16 q-18 0 -26 -16 l-10 -20 q-6 -12 -20 -12 H92 Q40 230 40 150 Q40 70 92 70 Z"
          fill="url(#nsBlue)" stroke="#0d3f7d" stroke-width="7" stroke-linejoin="round"/>
    <!-- inner light-blue bevel -->
    <path d="M104 84 H752 L884 150 L752 216 H452 q-20 0 -28 16 l-8 16 q-6 12 -20 12 q-14 0 -20 -12 l-8 -16 q-8 -16 -28 -16 H104 Q58 216 58 150 Q58 84 104 84 Z"
          fill="none" stroke="#63aef0" stroke-width="6" stroke-linejoin="round" opacity="0.85"/>
    <!-- top gloss highlight -->
    <path d="M108 92 H748 L862 150 H120 Q68 150 78 118 Q84 96 108 92 Z" fill="url(#nsGloss)"/>
  </g>

  <!-- corner sparkles (green bursts) -->
  <g fill="url(#nsSpark)">
    <g transform="translate(74 40) rotate(-8)">
      <rect x="-4" y="-34" width="10" height="34" rx="5"/>
      <rect x="-30" y="-22" width="10" height="30" rx="5" transform="rotate(-34)"/>
      <rect x="20" y="-22" width="10" height="30" rx="5" transform="rotate(34)"/>
    </g>
    <g transform="translate(858 46) rotate(8)">
      <rect x="-4" y="-32" width="10" height="32" rx="5"/>
      <rect x="18" y="-20" width="10" height="28" rx="5" transform="rotate(34)"/>
      <rect x="-28" y="-20" width="10" height="28" rx="5" transform="rotate(-34)"/>
    </g>
  </g>

  <!-- wordmark -->
  <g filter="url(#nsTxtShadow)" font-family="'Arial Rounded MT Bold','Trebuchet MS','Baloo 2',system-ui,sans-serif" font-weight="700" font-size="120" letter-spacing="-3">
    <text x="490" y="192" text-anchor="middle" paint-order="stroke" stroke-linejoin="round">
      <tspan fill="#ffffff" stroke="#13315e" stroke-width="14">www.</tspan><tspan fill="url(#nsGreen)" stroke="#2c5a10" stroke-width="14">nycsim</tspan><tspan fill="#ffffff" stroke="#13315e" stroke-width="14">.com</tspan>
    </text>
  </g>
</svg>
